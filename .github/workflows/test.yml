name: Test

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend / PHP 8.4 / Swoole 6.2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, redis, zlib, bcmath, openssl, opcache
          tools: composer:v2
          coverage: none

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-req=ext-opcache

      - name: Enable bundled Swoole runtime
        run: chmod +x bin/smart.php bin/swoole-linux-x64

      - name: Run PHPUnit
        run: ./bin/smart.php runtime vendor/bin/phpunit

      - name: Run PHPStan
        run: ./bin/smart.php runtime vendor/bin/phpstan analyse plugin config tests --level=0 --memory-limit=1G

      - name: Hyperf command smoke test
        run: ./bin/smart.php list

  frontend:
    name: Frontend / Typecheck / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: |
          npm install -g pnpm@10.28.2
          pnpm --version

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: web
        run: pnpm -F @vben/web-antd run typecheck

      - name: Build
        working-directory: web
        run: pnpm -F @vben/web-antd run build
