name: Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, redis, zlib, bcmath, openssl, opcache
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: |
          npm install -g pnpm@10.28.2
          pnpm --version

      - name: Prefer GitHub package repositories
        run: |
          # 公开仓同步或替换 Tag 后，Packagist 元数据可能滞后；CI 必须直接按 GitHub Tag 解析基础包。
          composer config --global repositories.smart-admin-library vcs https://github.com/zoujingli/SmartAdminLibrary.git
          composer config --global repositories.smart-admin-builder vcs https://github.com/zoujingli/SmartAdminBuilder.git

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-req=ext-opcache

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: pnpm -F @vben/web-antd run build

      - name: Enable bundled Swoole runtime
        run: chmod +x bin/smart.php bin/swoole-linux-x64

      - name: Hyperf command smoke test
        run: ./bin/smart.php list
